    <main>
        <h5>Projetos básico feitos com html e css.</h5>
        <div class="container">
            <div class="item">
              <div class="card">
                <img src="login.png" />
              </div>
            </div>
            <div class="item">
              <div class="card">
                <img src="Marvel - Google Chrome 15_08_2024 14_16_23.png" />

            </div>
            <div class="item">

            </div>
          </div>
          <style>
            @import url('https://fonts.googleapis.com/css?family=Ubuntu:400,700&display=swap');
          
            body {
              padding: 0;
              margin: 0;
              height: 100vh;
              display: grid;
              align-items: center;
              font-family: 'Ubuntu';
              background: rgb(238, 174, 202);
              background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
            }
          
            .container {
              max-width: 1200px;
              margin: auto;
              display: flex;
              flex-direction: column;
              grid-template-columns: repeat(3, 1fr);
              grid-gap: 20px;
              padding: 20px;
              box-sizing: border-box;
            }
          
            .item {
              background: #0234FF;
              border-radius: 15px;
              overflow: hidden;
            }
          
            .card {
              position: relative;
              width: 100%;
              padding-top: 56.25%; /* 16:9 aspect ratio */
              overflow: hidden;
              border-radius: 15px;
            }
          
            .card img {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              object-fit: cover;
              border-radius: 15px;
            }
          </style>
          
    </style>
    <script src="java.js" defer></script>
